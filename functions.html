<!DOCTYPE html>
<html>
    <!-- In head tag we can add title and mainly we use for that purpose --> 
    <head>
        <title> Different Types Of Functions</title>
    </head>
    <body>
        <p><b> Hello World </b></p>
         <p><strong> Hello World </strong></p>
          <p><i> Hello World </i></p>
           <p><em> Hello World </em></p>
            <p><small> Hello World </small></p>
             <p><ins> Hello World </ins></p>
              <p><sub> Hello World </sub></p>
              <p><sup> Hello World </sup></p>

    </body>
</htmlsmall
